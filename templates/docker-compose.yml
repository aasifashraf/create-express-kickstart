version: "3.8"

services:
  app:
    build: .
    ports:
      - "__PORT__:__PORT__"
    environment:
      NODE_ENV: development
      PORT: __PORT__
      MONGODB_URI: __MONGODB_URI__
      CORS_ORIGIN: __CORS_ORIGIN__
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
